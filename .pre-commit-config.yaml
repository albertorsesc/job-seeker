# Optional but recommended: `pip install pre-commit && pre-commit install` to run these on every
# commit. They mirror what `make test` and CI enforce, so a green commit stays green in CI.
# Keep the rev in step with the `ruff` pin in pyproject.toml; `pre-commit autoupdate` does that.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
